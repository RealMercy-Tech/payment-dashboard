<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Create Your Account</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-container">
        
        <!-- Form Header Area -->
        <div class="login-header">
            <h2>Create Account</h2>
            <p>Join us today! It only takes a minute to get set up.</p>
        </div>

        <form id="form">
            <!-- Username Input -->
            <div class="input-group">
                <label for="name">Username</label>
                <input type="text" id="name" placeholder="Enter your username" required autocomplete="username">
            </div>

            <!-- Email Input -->
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" value="mercy@gmail.com" required autocomplete="email">
            </div>

            <!-- Phone Number Input -->
            <div class="input-group">
                <label for="number">Phone Number</label>
                <!-- Using type="tel" gives mobile users a much cleaner keypad layout -->
                <input type="tel" id="number" placeholder="Enter your phone number" required autocomplete="tel">
            </div>
          
            <!-- Password Input -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
            </div>

            <!-- Modern CTA Button -->
            <button type="submit" class="login-btn">
                <span>Sign Up</span>
            </button>

            <!-- Placeholder for dynamic status/error messages from signup.js -->
            <p id="message" class="status-message"></p>

            <!-- Footer Redirection -->
            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </form>
    </div>
</div>

<script src="./Js/signup.js"></script>
</body>
</html>
