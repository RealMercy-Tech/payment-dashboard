<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Demo Payment Dashboard</title>
    <link rel="stylesheet" href="./css/demo.css">
</head>
<body>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="#" class="logo">PayDemo</a>
        <div class="nav-buttons">
            <a href="./login.html" class="btn btn-login">Log In</a>
            <a href="./signup.html" class="btn btn-signup">Sign Up</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="hero-container">
        <div class="hero-text">
            <h1>The smarter way to manage <span>digital payments</span></h1>
            <p>Track transactions, analyze revenue, and scale your business globally with our demo payment infrastructure setup built for modern developers.</p>
            <div class="hero-cta">
                <a href="#" class="btn btn-signup">Get Started Free</a>
                <a href="#" class="btn btn-login">Explore Demo</a>
            </div>
        </div>
        
        <!-- Dashboard Mockup Graphic -->
        <div class="hero-visual">
            <div class="dashboard-mockup">
                <div class="mock-header"></div>
                <div class="mock-stats">
                    <div class="mock-card">
                        <div class="mock-line" style="width: 40%;"></div>
                        <div class="mock-line" style="width: 80%; background-color: var(--primary-blue); height: 16px;"></div>
                    </div>
                    <div class="mock-card">
                        <div class="mock-line" style="width: 50%;"></div>
                        <div class="mock-line" style="width: 60%; background-color: var(--dark-blue); height: 16px;"></div>
                    </div>
                </div>
                <div class="mock-chart">
                    <div class="mock-bar"></div>
                    <div class="mock-bar"></div>
                    <div class="mock-bar active"></div>
                    <div class="mock-bar"></div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
